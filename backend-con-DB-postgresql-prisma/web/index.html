<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probar API con React (CDN)</title>

    <!-- 1️⃣ Nos bajamos React desde internet (Sin instalar nada en la compu) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- 2️⃣ Nos bajamos Babel (El traductor que va a leer el JSX en caliente) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        main {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            font-family: sans-serif;
        }

        article {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <!-- El punto de montaje donde React va a dibujar todo -->
    <div id="root"></div>

    <!-- 3️⃣ El type tiene que ser "text/babel" para que el traductor lo procese -->
    <script type="text/babel">
        // Sacamos los hooks directamente del objeto global de React
        const { useState, useEffect } = React;
        const API_URL = 'http://localhost:1234/movies';

        function App() {
            const [movies, setMovies] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(API_URL)
                    .then(res => res.json())
                    .then(data => {
                        setMovies(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            }, []);

            if (loading) return <h2 style={{ textAlign: 'center' }}>Cargando cartelera con React...</h2>;

            return (
                <div style={{ padding: '20px' }}>
                    <h1 style={{ textAlign: 'center', fontFamily: 'sans-serif' }}>🍿 Cartelera con React</h1>
                    <main>
                        {movies.map(movie => (
                            <article key={movie._id || movie.id}>
                                <h2>{movie.title}</h2>
                                <img src={movie.poster} alt={movie.title} />
                                <p><b>Año:</b> {movie.year}</p>
                            </article>
                        ))}
                    </main>
                </div>
            );
        }

        // Le decimos a React que tome el control del div con id "root" y dibuje la App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
